<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analysis History</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="history-container">

<div class="history-header">

<h1>
<i class="fa-solid fa-clock-rotate-left"></i>
Analysis History
</h1>

<a href="dashboard.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

<div class="search-history">

<input type="text"
placeholder="Search repository...">

<button>

<i class="fa-solid fa-magnifying-glass"></i>

Search

</button>

</div>

<div class="history-table">

<table>

<tr>

<th>Repository</th>

<th>Health Score</th>

<th>Date</th>

<th>Status</th>

<th>Action</th>

</tr>

<tr>

<td>RepoAI</td>

<td>92%</td>

<td>06 Jul 2026</td>

<td><span class="excellent">Excellent</span></td>

<td>

<button class="view-btn">

View Report

</button>

</td>

</tr>

<tr>

<td>Weather App</td>

<td>84%</td>

<td>05 Jul 2026</td>

<td><span class="good">Good</span></td>

<td>

<button class="view-btn">

View Report

</button>

</td>

</tr>

<tr>

<td>Library System</td>

<td>71%</td>

<td>04 Jul 2026</td>

<td><span class="average">Average</span></td>

<td>

<button class="view-btn">

View Report

</button>

</td>

</tr>

<tr>

<td>E-Commerce</td>

<td>65%</td>

<td>03 Jul 2026</td>

<td><span class="poor">Needs Improvement</span></td>

<td>

<button class="view-btn">

View Report

</button>

</td>

</tr>

</table>

</div>

<div class="history-summary">

<div class="summary-card">

<h2>Repositories Analyzed</h2>

<h1>24</h1>

</div>

<div class="summary-card">

<h2>Average Score</h2>

<h1>81%</h1>

</div>

<div class="summary-card">

<h2>Highest Score</h2>

<h1>96%</h1>

</div>

</div>

</div>

</body>

</html>
